services:
  api:
    build:
      context: ./apps/api
    ports:
      - "3002:3002"
    volumes:
      - db_data:/app/data
    environment:
      - NODE_ENV=production

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3002
    depends_on:
      - api

volumes:
  db_data: